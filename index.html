<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto 90 Dias - Luiza</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(to bottom, #ffe6f0, #ffffff);
margin:0;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#e91e63;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:15px;
background:#e91e63;
color:white;
font-weight:bold;
}

.progress{
margin-top:15px;
font-weight:bold;
color:#444;
}
</style>
</head>

<body>

<div class="container">
<h1>Projeto 90 Dias 💖</h1>

<label>Peso (kg)</label>
<input type="number" id="peso">

<label>Cintura (cm)</label>
<input type="number" id="cintura">

<label>Quadril (cm)</label>
<input type="number" id="quadril">

<label>Carga Agachamento (kg)</label>
<input type="number" id="agachamento">

<label>Carga Elevação Pélvica (kg)</label>
<input type="number" id="elevacao">

<button onclick="salvar()">Salvar Dia</button>

<div class="progress" id="contador"></div>
</div>

<script>
let dias = localStorage.getItem("dias") || 0;
document.getElementById("contador").innerHTML = 
"Dia atual: " + dias + " de 90";

function salvar(){
dias++;
localStorage.setItem("dias", dias);
document.getElementById("contador").innerHTML = 
"Dia atual: " + dias + " de 90";
alert("Dia salvo com sucesso 💖 Continue firme!");
}
</script>

</body>
</html>
