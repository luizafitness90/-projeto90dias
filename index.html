<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Carnaval 2027</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0f0f0f;
  color:white;
}
.nav{
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px;
}
button{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#ff0055;
  color:white;
  cursor:pointer;
}
.hidden{display:none;}
.card{
  background:#1a1a1a;
  margin:15px;
  padding:15px;
  border-radius:15px;
}
input{
  padding:8px;
  border-radius:8px;
  border:none;
  margin:5px;
}
</style>
</head>
<body>

<div class="nav">
  <button onclick="mostrar('home')">🏠 Início</button>
  <button onclick="mostrar('corrida')">🏃 Corrida</button>
</div>

<div id="home">
  <div class="card">
    <h2>🔥 Projeto Carnaval 2027</h2>
    <p>Evolução contínua até o Carnaval.</p>
  </div>
</div>

<div id="corrida" class="hidden">
  <div class="card">
    <h2>🏃 Projeto Corridas</h2>

    <h3>⏱ Cronômetro</h3>
    <p id="cronometro">0</p>
    <button onclick="iniciar()">Iniciar</button>
    <button onclick="parar()">Parar</button>

    <h3>Registrar corrida</h3>
    <input type="number" id="km" placeholder="Km">
    <button onclick="salvarCorrida()">Salvar</button>

    <p id="ritmo"></p>

    <h3>📊 Meta mensal</h3>
    <p id="meta"></p>

    <canvas id="grafico"></canvas>

    <h3>📜 Histórico</h3>
    <ul id="lista"></ul>
  </div>
</div>

<script>
function mostrar(secao){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("corrida").classList.add("hidden");
  document.getElementById(secao).classList.remove("hidden");
}

let tempo = 0;
let intervalo;

function iniciar(){
  intervalo = setInterval(()=>{
    tempo++;
    document.getElementById("cronometro").innerText = tempo + " s";
  },1000);
}

function parar(){
  clearInterval(intervalo);
}

function salvarCorrida(){
  const km = parseFloat(document.getElementById("km").value);
  if(!km || tempo==0) return;

  const minutos = tempo/60;
  const ritmo = (minutos/km).toFixed(2);

  let corridas = JSON.parse(localStorage.getItem("corridas")) || [];
  corridas.push({km, minutos, ritmo});
  localStorage.setItem("corridas", JSON.stringify(corridas));

  document.getElementById("ritmo").innerText = "Ritmo: "+ritmo+" min/km";

  tempo=0;
  document.getElementById("cronometro").innerText="0";

  carregar();
}

function carregar(){
  const lista = document.getElementById("lista");
  lista.innerHTML="";
  let corridas = JSON.parse(localStorage.getItem("corridas")) || [];

  let totalMes = 0;
  corridas.forEach(c=>{
    totalMes+=c.km;
    let li=document.createElement("li");
    li.innerText = c.km+" km - "+c.minutos.toFixed(1)+" min - Ritmo "+c.ritmo;
    lista.appendChild(li);
  });

  document.getElementById("meta").innerText = 
  "Total no mês: "+totalMes+" km (Meta: 50 km)";

  gerarGrafico(corridas);
}

function gerarGrafico(corridas){
  const ctx=document.getElementById("grafico");
  new Chart(ctx,{
    type:"line",
    data:{
      labels:corridas.map((c,i)=>"Treino "+(i+1)),
      datasets:[{
        label:"Km",
        data:corridas.map(c=>c.km),
        borderColor:"#ff0055",
        fill:false
      }]
    }
  });
}

window.onload=carregar;

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
